name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege token for all jobs (was previously unset -> default perms)
permissions:
  contents: read

jobs:
  test:
    name: Tests (Windows, Python 3.12)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest -q

  security:
    name: Security (secret scan + dependency audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the secret scan covers every commit

      - name: Secret scan (gitleaks, full history)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dependency audit (pip-audit)
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
          python -m pip install pip-audit
          python -m pip_audit --skip-editable
